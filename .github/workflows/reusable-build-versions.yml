name: Reusable Build Versions

on:
  workflow_call:
    inputs:
      versions_json:
        description: JSON matrix include payload for versions
        required: true
        type: string
      build_profile:
        description: Build profile
        required: false
        type: string
        default: production
      force_build:
        description: Force build even if tags may already exist
        required: false
        type: string
        default: 'false'
      base_image_default:
        description: Base image used by DockerfileModifier
        required: true
        type: string
      haproxy_image:
        description: HAProxy image for QUIC/H3 support (GHCR mirror with Docker Hub fallback)
        required: false
        type: string
        default: 'haproxy:lts-alpine'
      ghcr_repo:
        description: GHCR repository
        required: true
        type: string
      dockerhub_repo:
        description: Docker Hub repository
        required: true
        type: string
      default_platforms:
        description: Build platforms
        required: true
        type: string
      export_cache_concurrency:
        description: Buildx export cache concurrency
        required: false
        type: string
        default: '4'
      export_layers_concurrency:
        description: Buildx export layers concurrency
        required: false
        type: string
        default: '4'
      buildkit_step_log_max_size:
        description: BuildKit step log max size
        required: false
        type: string
        default: '50000000'
      buildkit_step_log_max_speed:
        description: BuildKit step log max speed
        required: false
        type: string
        default: '100000000'
      buildkit_progress:
        description: BuildKit progress mode
        required: false
        type: string
        default: plain
      docker_buildkit_inline_cache:
        description: BuildKit inline cache
        required: false
        type: string
        default: '1'
    secrets:
      DOCKERHUB_USERNAME:
        description: Docker Hub username
        required: true
      DOCKERHUB_TOKEN:
        description: Docker Hub token
        required: true

permissions:
  contents: read
  packages: write

jobs:
  build-versions:
    name: Build ${{ matrix.version }}
    runs-on: ubuntu-latest
    concurrency:
      group: build-${{ matrix.version }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        include: ${{ fromJson(inputs.versions_json) }}

    steps:
      - name: Sanitize inputs (trim whitespace)
        id: sanitize
        shell: bash
        run: |
          set -euo pipefail
          trim() { local v="$*"; v="${v#"${v%%[![:space:]]*}"}"; v="${v%"${v##*[![:space:]]}"}" ; printf '%s' "$v"; }
          echo "ghcr_repo=$(trim '${{ inputs.ghcr_repo }}')" >> "$GITHUB_OUTPUT"
          echo "dockerhub_repo=$(trim '${{ inputs.dockerhub_repo }}')" >> "$GITHUB_OUTPUT"
          echo "default_platforms=$(trim '${{ inputs.default_platforms }}')" >> "$GITHUB_OUTPUT"
          echo "base_image_default=$(trim '${{ inputs.base_image_default }}')" >> "$GITHUB_OUTPUT"
          echo "haproxy_image=$(trim '${{ inputs.haproxy_image }}')" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve build profile
        id: profile
        uses: ./.github/actions/resolve-build-profile
        with:
          build_profile: ${{ inputs.build_profile }}

      - name: Setup build environment
        uses: ./.github/actions/setup-build-env
        with:
          do_checkout: 'false'
          setup_qemu: 'true'
          setup_buildx: 'true'
          login_dockerhub: 'true'
          login_ghcr: 'true'
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}
          ghcr_actor: ${{ github.actor }}
          ghcr_token: ${{ github.token }}

      - name: Check existing tags
        id: check-existing
        shell: bash
        run: |
          set -euo pipefail

          RESULT="$({ FORCE_BUILD="${{ inputs.force_build }}" GHCR_REPO="${{ steps.sanitize.outputs.ghcr_repo }}" VERSION="${{ matrix.version }}" bash .github/scripts/check-existing-tags.sh; } )"
            ${{ steps.sanitize.outputs.dockerhub_repo }}:${{ matrix.image_tag }}
            ${{ steps.sanitize.outputs.dockerhub_repo }}:${{ matrix.version }}
          echo "$RESULT"
          SKIP_LINE="$(echo "$RESULT" | awk -F= '/^skip_build=/{print $0}' | tail -n1)"
          if [[ -z "$SKIP_LINE" ]]; then
            echo "check-existing-tags did not return skip_build output" >&2
            exit 1
          fi
          echo "$SKIP_LINE" >> "$GITHUB_OUTPUT"

      - name: Generate Dockerfile via DockerfileModifier.sh
        if: steps.check-existing.outputs.skip_build != 'true'
        shell: bash
        run: |
          set -euo pipefail
          echo "Using base image: ${{ steps.sanitize.outputs.base_image_default }}"
          mkdir -p build_data
          echo "${{ steps.sanitize.outputs.base_image_default }}" > ./build_data/base-image

          # Resolve HAProxy image with fallback: try GHCR mirror, fall back to Docker Hub
          HAPROXY_IMG="${{ steps.sanitize.outputs.haproxy_image }}"
          if ! crane digest "$HAPROXY_IMG" >/dev/null 2>&1; then
            # Strip GHCR prefix (ghcr.io/<owner>/base-images/<image>:<tag> → <image>:<tag>)
            HAPROXY_FALLBACK="${HAPROXY_IMG##*/}"
            echo "HAProxy image '$HAPROXY_IMG' not available, falling back to '$HAPROXY_FALLBACK'"
            HAPROXY_IMG="$HAPROXY_FALLBACK"
          fi
          echo "Using HAProxy image: $HAPROXY_IMG"
          echo "$HAPROXY_IMG" > ./build_data/haproxy-image

          echo "${{ matrix.version }}" > ./build_data/version
          touch ./build_data/build
          bash ./DockerfileModifier.sh
          test -f ./Dockerfile.time-mcp

      - name: Build and push image
        if: steps.check-existing.outputs.skip_build != 'true'
        env:
          BUILDKIT_STEP_LOG_MAX_SIZE: ${{ inputs.buildkit_step_log_max_size }}
          BUILDKIT_STEP_LOG_MAX_SPEED: ${{ inputs.buildkit_step_log_max_speed }}
          BUILDKIT_PROGRESS: ${{ inputs.buildkit_progress }}
          DOCKER_BUILDKIT_INLINE_CACHE: ${{ inputs.docker_buildkit_inline_cache }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.time-mcp
          push: true
          platforms: ${{ steps.sanitize.outputs.default_platforms }}
          tags: |
            ${{ steps.sanitize.outputs.ghcr_repo }}:${{ matrix.image_tag }}
            ${{ steps.sanitize.outputs.ghcr_repo }}:${{ matrix.version }}
            ${{ steps.sanitize.outputs.dockerhub_repo }}:${{ matrix.image_tag }}
            ${{ steps.sanitize.outputs.dockerhub_repo }}:${{ matrix.version }}
          cache-from: type=gha,scope=time-${{ matrix.version }}
            ${{ steps.sanitize.outputs.dockerhub_repo }}:${{ matrix.image_tag }}
            ${{ steps.sanitize.outputs.dockerhub_repo }}:${{ matrix.version }}
          cache-to: type=gha,scope=time-${{ matrix.version }},mode=max,compression=zstd
            ${{ steps.sanitize.outputs.dockerhub_repo }}:${{ matrix.image_tag }}
            ${{ steps.sanitize.outputs.dockerhub_repo }}:${{ matrix.version }}
          outputs: type=registry,oci-mediatypes=true,${{ steps.profile.outputs.compression_params }},export-cache-concurrency=${{ inputs.export_cache_concurrency }},export-layers-concurrency=${{ inputs.export_layers_concurrency }}
          build-args: |
            BUILDKIT_INLINE_CACHE=1
            TIME_VERSION=${{ matrix.version }}
            BASE_IMAGE=${{ steps.sanitize.outputs.base_image_default }}
          provenance: false
          sbom: false

      - name: Verify Docker Hub parity (fallback sync if dual-push missed DH)
        if: steps.check-existing.outputs.skip_build != 'true'
        uses: ./.github/actions/registry-sync
        with:
          dockerhub_repo: ${{ steps.sanitize.outputs.dockerhub_repo }}
          ghcr_repo: ${{ steps.sanitize.outputs.ghcr_repo }}
          tags: ${{ matrix.image_tag }},${{ matrix.version }}
